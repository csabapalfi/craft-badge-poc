<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>scan</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; }
  #reader { position: fixed; inset: 0; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
</style>
</head>
<body>
<div id="reader"></div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  // Gated: only this ticket is ever opened. Any other badge is silently ignored.
  var ALLOWED = "ti_p05PRGNpriDTy6fgd1kkPJw";
  var done = false;

  function extractId(text) {
    text = (text || "").trim();
    var m = text.match(/ti_[A-Za-z0-9]+/);
    return m ? m[0] : text;
  }

  function onScan(decodedText) {
    if (done) return;
    var id = extractId(decodedText);
    if (id !== ALLOWED) return;                      // ignore other attendees
    done = true;
    try { html5.stop(); } catch (e) {}
    window.location.href = "https://ti.to/tickets/" + id;
  }

  function qrbox(vw, vh) {
    var m = Math.floor(Math.min(vw, vh) * 0.75);
    return { width: m, height: m };
  }

  var html5 = new Html5Qrcode("reader", {
    verbose: false,
    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
  });

  html5.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: qrbox },
    onScan,
    function () {}
  ).then(function () {
    try { html5.applyVideoConstraints({ advanced: [{ focusMode: "continuous" }] }); } catch (e) {}
  }).catch(function (err) {
    console.error("camera error:", err);
  });
</script>
</body>
</html>
